<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Cosmetics Insights</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>

<div class="container">

    <!-- Left Side -->
    <div class="left">

        <h1>💄 Cosmetics Insights</h1>

        <h2>Welcome Back!</h2>

        <p>
            Discover the perfect skincare products with our
            Cosmetics Recommendation System.
        </p>

    </div>

    <!-- Right Side -->
    <div class="right">

        <div class="login-box">

            <h2>Login</h2>

            {% if error %}
            <p class="error">{{ error }}</p>
            {% endif %}

            <form action="/login" method="POST">

                <div class="input-box">
                    <i class="fa fa-user"></i>

                    <input
                    type="text"
                    name="username"
                    placeholder="Username"
                    required>

                </div>

                <div class="input-box">

                    <i class="fa fa-lock"></i>

                    <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Password"
                    required>

                    <i class="fa fa-eye toggle-password"
                    onclick="togglePassword()"></i>

                </div>

                <button type="submit">
                    Login
                </button>

            </form>

        </div>

    </div>

</div>

<script src="{{ url_for('static', filename='js/login.js') }}"></script>

</body>
</html>
